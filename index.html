<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Fedi Ben Hadj Said</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#090C15;
  --surface:#111624;
  --card:#1A2035;
  --card-hover:#222A45;
  --teal:#00CFA8;
  --teal-hover:#00B892;
  --teal-dim:rgba(0,207,168,0.12);
  --teal-glow:rgba(0,207,168,0.2);
  --red:#D42A3B;
  --red-hover:#B82232;
  --red-dim:rgba(212,42,59,0.12);
  --light:#F5F0E8;
  --muted:#7B85A0;
  --border:#1E2540;
  --radius:8px;
  --radius-lg:14px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','Cascadia Code',monospace;
}
html{font-size:15px}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--light);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
::selection{background:var(--teal);color:var(--bg)}
:focus-visible{outline:2px solid var(--teal);outline-offset:2px;border-radius:4px}
img{display:block;max-width:100%}
button{border:none;background:none;cursor:pointer;font:inherit;color:inherit}
input,textarea,select{
  font:inherit;
  color:inherit;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:10px 14px;
  width:100%;
  transition:border-color 0.2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow)}
textarea{resize:vertical;min-height:80px}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:0.6}
label{display:block;font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:5px}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius);
  font-size:0.85rem;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  transition:all 0.2s;white-space:nowrap;
}
.btn-teal{background:var(--teal);color:var(--bg)}
.btn-teal:hover{background:var(--teal-hover);box-shadow:0 4px 16px var(--teal-glow);transform:translateY(-1px)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:var(--red-hover);box-shadow:0 4px 16px var(--red-glow)}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-sm{padding:6px 12px;font-size:0.75rem}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:var(--radius)}
.btn-icon svg{width:16px;height:16px}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* LOGIN */
#login-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.login-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:40px;
  width:100%;max-width:380px;
}
.login-logo{font-family:'Staatliches',var(--font);font-size:1.6rem;letter-spacing:2px;text-align:center;margin-bottom:4px}
.login-logo span{color:var(--red)}
.login-sub{text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:28px}
.login-card .form-group{margin-bottom:16px}
.login-card .btn{width:100%;justify-content:center;margin-top:8px}
.login-error{font-size:0.82rem;color:var(--red);text-align:center;margin-top:10px;min-height:20px}

/* DASHBOARD LAYOUT */
#dashboard{display:none;min-height:100vh}
#dashboard.active{display:flex;flex-direction:column}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:56px;
  background:var(--card);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-brand svg{color:var(--red)}
.topbar-brand span{font-family:'Staatliches',var(--font);font-size:1.25rem;letter-spacing:1.5px}
.topbar-brand small{font-size:0.7rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.topbar-user{font-size:0.8rem;color:var(--muted)}

/* TABS */
.tab-bar{
  display:flex;gap:0;
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 20px;flex-shrink:0;overflow-x:auto;
}
.tab-btn{
  padding:14px 22px;font-size:0.82rem;font-weight:500;
  color:var(--muted);text-transform:uppercase;letter-spacing:1px;
  border-bottom:2px solid transparent;
  transition:all 0.2s;white-space:nowrap;
}
.tab-btn:hover{color:var(--light)}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}

/* MAIN CONTENT */
.admin-content{flex:1;padding:28px;overflow-y:auto}
.panel{display:none}
.panel.active{display:block}

/* GALLERY */
.gallery-toolbar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  margin-bottom:24px;padding:16px 20px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
}
.gallery-toolbar label{margin-bottom:0;white-space:nowrap;font-size:0.72rem}
.gallery-toolbar select{width:auto;min-width:240px;padding:8px 12px}
.gallery-toolbar .btn{flex-shrink:0}
.gallery-count{font-size:0.8rem;color:var(--muted);margin-left:auto}

.gallery-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}
.gallery-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  transition:border-color 0.2s,transform 0.2s;
}
.gallery-card:hover{border-color:var(--teal-dim);transform:translateY(-2px)}
.gallery-card-thumb{
  width:100%;aspect-ratio:4/3;
  background:var(--surface);overflow:hidden;
  cursor:pointer;position:relative;
}
.gallery-card-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.3s;
}
.gallery-card-thumb:hover img{transform:scale(1.05)}
.gallery-card-body{padding:10px 12px 12px}
.gallery-card-name{
  font-size:0.72rem;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:8px;font-family:var(--mono);
}
.gallery-card-actions{display:flex;gap:4px;flex-wrap:wrap}
.gallery-card-actions .btn{flex:1;min-width:0}

/* ABOUT */
.about-editor{max-width:800px}
.about-paragraph-editor{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:18px 20px;
  margin-bottom:14px;
}
.about-paragraph-editor textarea{min-height:100px}
.about-paragraph-actions{display:flex;gap:8px;margin-top:8px;justify-content:flex-end}
.about-editor-actions{display:flex;gap:10px;margin-top:20px}

/* CAREER */
.career-editor{max-width:800px}
.career-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;
}
.career-section-title{
  font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;
  margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.career-section-title.fb{color:var(--red)}
.career-section-title.ef{color:var(--teal)}
.career-stat-row{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  margin-bottom:10px;
}
.career-actions{margin-top:20px}

/* PREVIEW MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:9000;
  background:rgba(9,12,21,0.92);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:40px;
}
.modal-overlay.open{display:flex}
.modal-close{
  position:fixed;top:20px;right:24px;
  width:40px;height:40px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  color:var(--light);font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;z-index:2;
}
.modal-close:hover{background:var(--red)}
.modal-img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}

/* NOTIFICATION */
.notification{
  position:fixed;bottom:28px;right:28px;z-index:9900;
  padding:14px 22px;border-radius:var(--radius);
  font-size:0.88rem;font-weight:500;
  transform:translateY(120px);opacity:0;
  transition:all 0.35s ease;
  pointer-events:none;max-width:360px;
}
.notification.show{transform:translateY(0);opacity:1}
.notification.success{background:var(--teal);color:var(--bg)}
.notification.error{background:var(--red);color:#fff}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{margin-bottom:12px;opacity:0.3}
.empty-state p{font-size:0.95rem}

/* UPLOAD LABEL */
.upload-label{cursor:pointer}
.upload-label:hover{background:var(--teal-hover)!important;box-shadow:0 4px 16px var(--teal-glow);transform:translateY(-1px)}
.upload-label input[type="file"]{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .topbar{padding:0 16px}
  .topbar-brand small{display:none}
  .tab-btn{padding:12px 14px;font-size:0.75rem}
  .admin-content{padding:16px}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .gallery-toolbar{flex-direction:column;align-items:stretch}
  .gallery-toolbar select{width:100%;min-width:0}
  .gallery-count{margin-left:0;text-align:right}
  .career-stat-row{grid-template-columns:1fr}
  .modal-overlay{padding:20px}
}
</style>
</head>
<body>

      Career Content
    </button>
  </nav>

  <main class="admin-content">

    <!-- GALLERY PANEL -->
    <section class="panel active" id="panel-gallery">
      <div class="gallery-toolbar">
        <label for="add-image-select">From Library</label>
        <select id="add-image-select"></select>
        <button class="btn btn-teal btn-sm" onclick="addImage()">+ Add</button>
        <span style="color:var(--muted);font-size:0.8rem">|</span>
        <label for="upload-input" class="btn btn-teal btn-sm upload-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload from Device
        </label>
        <input type="file" id="upload-input" accept="image/*" multiple style="display:none">
        <span class="gallery-count" id="gallery-count">0 images</span>
      </div>
      <div id="gallery-grid" class="gallery-grid"></div>
    </section>

    <!-- ABOUT PANEL -->
    <section class="panel" id="panel-about">
      <div class="about-editor">
        <p style="color:var(--muted);font-size:0.85rem;margin-bottom:18px">
          Edit the About section paragraphs. Use &lt;strong&gt; tags for bold text if needed.
        </p>
        <div id="about-paragraphs"></div>
        <div class="about-editor-actions">
          <button class="btn btn-ghost btn-sm" onclick="addParagraph()">+ Add Paragraph</button>
          <button class="btn btn-teal btn-sm" onclick="saveAbout()">Save About Content</button>
        </div>
      </div>
    </section>

    <!-- CAREER PANEL -->
    <section class="panel" id="panel-career">
      <div class="career-editor">
        <p style="color:var(--muted);font-size:0.85rem;margin-bottom:18px">
          Edit the career stat cards. Each stat has a <strong>value</strong> (e.g. "50+") and a <strong>label</strong> (e.g. "National Team Appearances").
        </p>
        <div class="career-section">
          <div class="career-section-title fb">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/><path d="M2 12h20"/></svg>
            Football Stats
          </div>
          <div id="career-football"></div>
        </div>
        <div class="career-section">
          <div class="career-section-title ef">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4"/><path d="M14 12h4"/><path d="M8 10v4"/><path d="M16 10v4"/></svg>
            eFootball Stats
          </div>
          <div id="career-efootball"></div>
        </div>
        <div class="career-actions">
          <button class="btn btn-teal btn-sm" onclick="saveCareer()">Save Career Content</button>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="preview-modal" onclick="closePreview()">
  <button class="modal-close" onclick="closePreview()">&times;</button>
  <img class="modal-img" id="preview-img" src="" alt="Preview">
</div>

/* ============================================================
   STORAGE
   ============================================================ */
function store(key, val) {
  try { localStorage.setItem('fedi_admin_' + key, JSON.stringify(val)) } catch(e) {}
}
function load(key, fallback) {
  try {
    var v = localStorage.getItem('fedi_admin_' + key);
    return v !== null ? JSON.parse(v) : fallback;
  } catch(e) { return fallback }
}

/* ============================================================
   AUTH
   ============================================================ */
function handleLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var err = document.getElementById('login-error');
  if (u === 'fedi' && p === 'fedilovesadem2012') {
    store('logged_in', true);
    store('user', u);
    enterDashboard();
  } else {
    err.textContent = 'Invalid username or password.';
  }
}

function handleLogout() {
  store('logged_in', false);
  document.getElementById('dashboard').classList.remove('active');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
}

function enterDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').classList.add('active');
  document.getElementById('topbar-user').textContent = 'fedi';
  initGallery();
  initAbout();
  initCareer();
  updateAddSelect();
}

/* ============================================================
   NOTIFICATION
   ============================================================ */
var notifTimer = null;
function notify(msg, type) {
  var el = document.getElementById('notification') || (function() {
    var n = document.createElement('div');
    n.id = 'notification';
    n.className = 'notification';
    document.body.appendChild(n);
    return n;
  })();
  if (notifTimer) { clearTimeout(notifTimer); el.classList.remove('show') }
  el.textContent = msg;
  el.className = 'notification ' + type;
  requestAnimationFrame(function() { el.classList.add('show') });
  notifTimer = setTimeout(function() { el.classList.remove('show') }, 2800);
}

/* ============================================================
   TAB SWITCHING
   ============================================================ */
function switchPanel(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active') });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active') });
  document.querySelector('.tab-btn[data-panel="' + name + '"]').classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'gallery') { renderGallery(); updateAddSelect() }
}

/* ============================================================
   GALLERY
   ============================================================ */
function getGallery() { return load('gallery', DEFAULT_GALLERY.slice()) }
function saveGallery(arr) { store('gallery', arr); renderGallery(); updateAddSelect(); updateGalleryCount() }
function updateGalleryCount() {
  var g = getGallery();
  document.getElementById('gallery-count').textContent = g.length + ' image' + (g.length !== 1 ? 's' : '');
}

/* ===== UPLOAD ===== */
function getUploads() { return load('uploads', {}) }
function saveUploads(obj) { store('uploads', obj) }

function getImageSrc(filename) {
  var uploads = getUploads();
  if (uploads[filename]) return uploads[filename];
  return '../images/' + encodeURI(filename);
}

document.getElementById('upload-input').addEventListener('change', function(e) {
  var files = e.target.files;
  if (!files || files.length === 0) return;
  var uploads = getUploads();
  var gallery = getGallery();
  var processed = 0;
  for (var fi = 0; fi < files.length; fi++) {
    (function(file) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        var dataUrl = ev.target.result;
        // Generate unique filename preserving extension
        var ext = file.name.split('.').pop() || 'jpg';
        var name = 'upload_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4) + '.' + ext;
        uploads[name] = dataUrl;
        gallery.push(name);
        processed++;
        if (processed === files.length) {
          saveUploads(uploads);
          saveGallery(gallery);
          document.getElementById('upload-input').value = '';
          notify('Uploaded ' + processed + ' image' + (processed > 1 ? 's' : ''), 'success');
        }
      };
      reader.readAsDataURL(file);
    })(files[fi]);
  }
});

function updateAddSelect() {
  var sel = document.getElementById('add-image-select');
  var current = getGallery();
  var available = ALL_IMAGES.filter(function(f) { return current.indexOf(f) === -1 });
  sel.innerHTML = '';
  if (available.length === 0) {
    sel.innerHTML = '<option value="">No more images available</option>';
    sel.disabled = true;
    return;
  }
  sel.disabled = false;
  available.forEach(function(f) {
    var opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    sel.appendChild(opt);
  });
}

function addImage() {
  var sel = document.getElementById('add-image-select');
  if (!sel.value || sel.disabled) return;
  var g = getGallery();
  g.push(sel.value);
  saveGallery(g);
  notify('Added ' + sel.value, 'success');
}

function removeImage(filename) {
  var g = getGallery();
  var idx = g.indexOf(filename);
  if (idx === -1) return;
  g.splice(idx, 1);
  // Also remove from uploads if it's an uploaded image
  var uploads = getUploads();
  if (uploads[filename]) {
    delete uploads[filename];
    saveUploads(uploads);
  }
  saveGallery(g);
  notify('Removed ' + filename, 'success');
}

function moveImage(filename, dir) {
  var g = getGallery();
  var idx = g.indexOf(filename);
  if (idx === -1) return;
  var tgt = idx + dir;
  if (tgt < 0 || tgt >= g.length) return;
  var tmp = g[idx];
  g[idx] = g[tgt];
  g[tgt] = tmp;
  saveGallery(g);
}

function previewImage(src) {
  document.getElementById('preview-img').src = src;
  document.getElementById('preview-modal').classList.add('open');
}

function closePreview() {
  document.getElementById('preview-modal').classList.remove('open');
}

function renderGallery() {
  var grid = document.getElementById('gallery-grid');
  var images = getGallery();
  if (images.length === 0) {
    grid.innerHTML = '<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><p>No images in the gallery. Add some using the dropdown or upload from your device.</p></div>';
    return;
  }
  var uploads = getUploads();
  var html = '';
  images.forEach(function(f, i) {
    var src = getImageSrc(f);
    var isUploaded = !!uploads[f];
    var first = i === 0;
    var last = i === images.length - 1;
    html += '<div class="gallery-card">'
      + '<div class="gallery-card-thumb" onclick="previewImage(\'' + src.replace(/'/g, "\\'") + '\')">'
      + '<img src="' + src + '" alt="' + f.replace(/"/g, '&quot;') + '" loading="lazy">'
      + '</div>'
      + '<div class="gallery-card-body">'
      + '<div class="gallery-card-name" title="' + f.replace(/"/g, '&quot;') + '">' + (isUploaded ? '<span style="color:var(--teal)">&#11014;</span> ' : '') + f.replace(/</g, '&lt;') + '</div>'
      + '<div class="gallery-card-actions">'
      + '<button class="btn btn-ghost btn-sm btn-icon" onclick="moveImage(\'' + f.replace(/'/g, "\\'") + '\',-1)" ' + (first ? 'disabled' : '') + ' title="Move up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg></button>'
      + '<button class="btn btn-ghost btn-sm btn-icon" onclick="moveImage(\'' + f.replace(/'/g, "\\'") + '\',1)" ' + (last ? 'disabled' : '') + ' title="Move down"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></button>'
      + '<button class="btn btn-red btn-sm" onclick="removeImage(\'' + f.replace(/'/g, "\\'") + '\')" title="Remove">Remove</button>'
      + '</div></div></div>';
  });
  grid.innerHTML = html;
}

function initGallery() { renderGallery(); updateGalleryCount() }

/* ============================================================
   ABOUT
   ============================================================ */
function getAbout() { return load('about', DEFAULT_ABOUT.slice()) }

function initAbout() { renderAbout() }

function renderAbout() {
  var container = document.getElementById('about-paragraphs');
  var paras = getAbout();
  if (paras.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>No paragraphs. Click "Add Paragraph" to create one.</p></div>';
    return;
  }
  var html = '';
  paras.forEach(function(p, i) {
    html += '<div class="about-paragraph-editor" data-idx="' + i + '">'
      + '<label>Paragraph ' + (i + 1) + '</label>'
      + '<textarea oninput="trackAboutChange()">' + p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</textarea>'
      + '<div class="about-paragraph-actions">'
      + '<button class="btn btn-ghost btn-sm" onclick="moveParagraph(' + i + ',-1)" ' + (i === 0 ? 'disabled' : '') + '>Move Up</button>'
      + '<button class="btn btn-ghost btn-sm" onclick="moveParagraph(' + i + ',1)" ' + (i === paras.length - 1 ? 'disabled' : '') + '>Move Down</button>'
      + '<button class="btn btn-red btn-sm" onclick="removeParagraph(' + i + ')">Delete</button>'
      + '</div></div>';
  });
  container.innerHTML = html;
}

function readAboutFromDOM() {
  var els = document.querySelectorAll('#about-paragraphs textarea');
  return Array.prototype.map.call(els, function(t) { return t.value });
}

function trackAboutChange() {}

function addParagraph() {
  var p = getAbout();
  p.push('');
  saveAboutRaw(p);
  renderAbout();
}

function removeParagraph(idx) {
  var p = getAbout();
  p.splice(idx, 1);
  saveAboutRaw(p);
  renderAbout();
}

function moveParagraph(idx, dir) {
  var p = getAbout();
  var tgt = idx + dir;
  if (tgt < 0 || tgt >= p.length) return;
  var tmp = p[idx];
  p[idx] = p[tgt];
  p[tgt] = tmp;
  saveAboutRaw(p);
  renderAbout();
}

function saveAboutRaw(arr) { store('about', arr) }

function saveAbout() {
  var content = readAboutFromDOM();
  saveAboutRaw(content);
  notify('About content saved!', 'success');
}

/* ============================================================
   CAREER
   ============================================================ */
function getCareer() { return load('career', JSON.parse(JSON.stringify(DEFAULT_CAREER))) }

function initCareer() { renderCareer() }

function renderCareer() {
  var data = getCareer();
  document.getElementById('career-football').innerHTML = renderCareerStats(data.football, 'football');
  document.getElementById('career-efootball').innerHTML = renderCareerStats(data.efootball, 'efootball');
}

function renderCareerStats(stats, prefix) {
  if (!stats || stats.length === 0) return '<div class="empty-state"><p>No stats defined.</p></div>';
  var html = '';
  stats.forEach(function(s, i) {
    html += '<div class="career-stat-row">'
      + '<div class="form-group" style="margin-bottom:0"><input type="text" class="career-val" data-prefix="' + prefix + '" data-idx="' + i + '" value="' + s.value.replace(/"/g,'&quot;') + '" placeholder="Value"></div>'
      + '<div class="form-group" style="margin-bottom:0"><input type="text" class="career-lbl" data-prefix="' + prefix + '" data-idx="' + i + '" value="' + s.label.replace(/"/g,'&quot;') + '" placeholder="Label"></div>'
      + '</div>';
  });
  return html;
}

function readCareerFromDOM() {
  var fb = [], ef = [];
  document.querySelectorAll('.career-val[data-prefix="football"]').forEach(function(inp) {
    var idx = parseInt(inp.getAttribute('data-idx'));
    fb[idx] = fb[idx] || {};
    fb[idx].value = inp.value;
  });
  document.querySelectorAll('.career-lbl[data-prefix="football"]').forEach(function(inp) {
    var idx = parseInt(inp.getAttribute('data-idx'));
    fb[idx] = fb[idx] || {};
    fb[idx].label = inp.value;
  });
  document.querySelectorAll('.career-val[data-prefix="efootball"]').forEach(function(inp) {
    var idx = parseInt(inp.getAttribute('data-idx'));
    ef[idx] = ef[idx] || {};
    ef[idx].value = inp.value;
  });
  document.querySelectorAll('.career-lbl[data-prefix="efootball"]').forEach(function(inp) {
    var idx = parseInt(inp.getAttribute('data-idx'));
    ef[idx] = ef[idx] || {};
    ef[idx].label = inp.value;
  });
  return { football: fb.filter(Boolean), efootball: ef.filter(Boolean) };
}

function saveCareer() {
  var data = readCareerFromDOM();
  store('career', data);
  notify('Career content saved!', 'success');
}

/* ============================================================
   KEYBOARD — Enter on login
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
  document.getElementById('login-user').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });

  // Auto-login if session exists
  if (load('logged_in', false)) {
    enterDashboard();
  }
});

// Close preview on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closePreview();
});

// Prevent preview modal click-out from closing when clicking image
document.getElementById('preview-img').addEventListener('click', function(e) { e.stopPropagation() });
</script>
